<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDU Cooling Loop — Live Model</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #14171A;
    --panel: #F6F7F8;
    --line: #E4E6E8;
    --red: #E2001A;
    --steel: #33475B;
    --muted: #6B7280;
    --cold: #0E7AC4;
    --warm: #E08A00;
    --hot: #D63030;
    --green: #0E9E6E;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--panel);
    font-family: 'IBM Plex Mono', monospace;
    color: var(--ink);
  }
  .loop-widget {
    width: 100%;
    min-height: 100vh;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
  }
  .loop-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .loop-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--steel);
  }
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--green);
    border: 1px solid var(--green);
    padding: 2px 8px;
    border-radius: 3px;
    background: #fff;
  }
  .live-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: blink 1.2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

  svg { display: block; width: 100%; height: auto; flex: 1; }

  .flow-cold {
    stroke: var(--cold);
    stroke-width: 4;
    fill: none;
    stroke-dasharray: 9 7;
    animation: flowmove 1.1s linear infinite;
  }
  .flow-hot {
    stroke: var(--hot);
    stroke-width: 4;
    fill: none;
    stroke-dasharray: 9 7;
    animation: flowmove 1.1s linear infinite;
  }
  .flow-warm {
    stroke: var(--warm);
    stroke-width: 4;
    fill: none;
    stroke-dasharray: 9 7;
    animation: flowmove 1.4s linear infinite;
  }
  @keyframes flowmove { to { stroke-dashoffset: -16; } }

  .pipe-bg {
    stroke: #DDE0E3;
    stroke-width: 8;
    fill: none;
    stroke-linecap: round;
  }
  .box {
    fill: #FFFFFF;
    stroke: var(--steel);
    stroke-width: 1.5;
  }
  .box-danfoss { stroke: var(--red); stroke-width: 1.8; }
  .box-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    fill: var(--ink);
    text-anchor: middle;
  }
  .box-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    fill: var(--muted);
    text-anchor: middle;
  }
  .danfoss-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    font-weight: 700;
    fill: var(--red);
    text-anchor: middle;
  }
  .temp-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    text-anchor: middle;
  }
  .loop-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    fill: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-anchor: middle;
  }

  .legend {
    display: flex;
    gap: 14px;
    margin-top: 10px;
    flex-wrap: wrap;
    font-size: 10.5px;
    color: var(--muted);
    justify-content: center;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-line { width: 18px; height: 3.5px; border-radius: 2px; }

  .metrics {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-top: 12px;
  }
  .metric {
    background: #FFFFFF;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 10px 12px;
    text-align: center;
  }
  .metric-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .metric-val { font-size: 22px; font-weight: 700; margin-top: 3px; }
  .m-cold { color: var(--cold); }
  .m-hot  { color: var(--hot); }
  .m-flow { color: var(--green); }
  .m-p    { color: var(--warm); }

  .control-panel {
    background: #FFFFFF;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .control-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--steel);
    margin-bottom: 10px;
  }
  .control-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .control-row:last-child { margin-bottom: 0; }
  .control-label {
    font-size: 10.5px;
    color: var(--muted);
    min-width: 78px;
  }
  .control-row input[type="range"] {
    flex: 1;
    accent-color: var(--red);
    height: 4px;
    cursor: pointer;
  }
  .control-value {
    font-size: 12px;
    font-weight: 700;
    color: var(--ink);
    min-width: 52px;
    text-align: right;
  }
  .mode-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }
  .mode-btn {
    flex: 1;
    padding: 6px 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border: 1px solid var(--line);
    background: #FFFFFF;
    color: var(--muted);
    border-radius: 4px;
    cursor: pointer;
  }
  .mode-btn.active {
    background: var(--red);
    border-color: var(--red);
    color: white;
  }

</style>
</head>
<body>

<div class="loop-widget">
  <div class="loop-head">
    <div class="loop-title">CDU Cooling Loop</div>
    <div class="live-badge" id="live-badge"><span class="live-dot"></span>LIVE</div>
  </div>

  <div class="control-panel">
    <div class="control-title">Model Input</div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-live" onclick="setMode('live')">Live Simulation</button>
      <button class="mode-btn" id="mode-manual" onclick="setMode('manual')">Manual Input</button>
    </div>
    <div class="control-row">
      <span class="control-label">Rack Load</span>
      <input type="range" id="in-load" min="10" max="150" value="45" step="1" oninput="onManualChange()" disabled>
      <span class="control-value" id="in-load-val">45 kW</span>
    </div>
    <div class="control-row">
      <span class="control-label">Facility Supply</span>
      <input type="range" id="in-fac-supply" min="6" max="20" value="12" step="0.5" oninput="onManualChange()" disabled>
      <span class="control-value" id="in-fac-supply-val">12.0°C</span>
    </div>
    <div class="control-row">
      <span class="control-label">Target ΔT</span>
      <input type="range" id="in-dt" min="4" max="16" value="8.4" step="0.2" oninput="onManualChange()" disabled>
      <span class="control-value" id="in-dt-val">8.4 K</span>
    </div>
  </div>

  <!-- VERTICAL LAYOUT: RACK top → CDU middle → FACILITY bottom -->
  <svg viewBox="0 0 440 560" xmlns="http://www.w3.org/2000/svg">

    <!-- ══ GPU RACK (top) ══ -->
    <rect class="box" x="110" y="16" width="220" height="74" rx="5"/>
    <text x="220" y="45" class="box-label">GPU RACK</text>
    <text x="220" y="63" class="box-sub">Direct-to-Chip</text>
    <text x="220" y="78" class="box-sub" id="rack-load-label">45.2 kW load</text>
    <rect x="110" y="16" width="220" height="74" rx="5" fill="none" stroke="#D63030" stroke-width="1.4" opacity="0.4">
      <animate attributeName="opacity" values="0.1;0.55;0.1" dur="2s" repeatCount="indefinite"/>
    </rect>

    <!-- ══ PIPES: RACK ↔ CDU ══ -->
    <text x="220" y="112" class="loop-name">Technology Loop (Secondary)</text>
    <!-- left = cold supply going UP to rack -->
    <path class="pipe-bg" d="M 150 168 L 150 90"/>
    <path class="flow-cold" d="M 150 168 L 150 90"/>
    <polygon points="144,102 150,90 156,102" fill="#0E7AC4"/>
    <!-- right = hot return going DOWN to CDU -->
    <path class="pipe-bg" d="M 290 90 L 290 168"/>
    <path class="flow-hot" d="M 290 90 L 290 168"/>
    <polygon points="284,156 290,168 296,156" fill="#D63030"/>
    <!-- temps -->
    <text x="96" y="136" class="temp-label" fill="#0E7AC4" id="t-sec-supply">27.4°C</text>
    <text x="348" y="136" class="temp-label" fill="#D63030" id="t-sec-return">35.8°C</text>
    <!-- sensor dots -->
    <circle cx="150" cy="130" r="5.5" fill="#FFFFFF" stroke="#0E7AC4" stroke-width="2"/>
    <circle cx="290" cy="130" r="5.5" fill="#FFFFFF" stroke="#D63030" stroke-width="2"/>

    <!-- ══ CDU (middle, Danfoss) ══ -->
    <rect class="box box-danfoss" x="80" y="168" width="280" height="210" rx="5"/>
    <text x="220" y="196" class="box-label" fill="#E2001A">CDU</text>
    <text x="220" y="213" class="box-sub">Liquid-to-Liquid</text>

    <!-- BPHE -->
    <rect x="120" y="226" width="200" height="38" fill="#F6F7F8" stroke="#9AA2AA" stroke-width="1" rx="4"/>
    <text x="220" y="242" class="box-sub">BPHE Heat Exchanger</text>
    <line x1="132" y1="252" x2="308" y2="252" stroke="#0E7AC4" stroke-width="2"/>
    <line x1="132" y1="257" x2="308" y2="257" stroke="#D63030" stroke-width="2"/>

    <!-- Danfoss components 2x2 -->
    <rect x="100" y="276" width="115" height="42" fill="#FDF2F3" stroke="#E2001A" stroke-width="1.2" rx="4"/>
    <text x="157" y="294" class="danfoss-tag">AB-QM</text>
    <text x="157" y="309" class="box-sub" style="font-size:9px;">Balancing Valve</text>

    <rect x="225" y="276" width="115" height="42" fill="#FDF2F3" stroke="#E2001A" stroke-width="1.2" rx="4"/>
    <text x="282" y="294" class="danfoss-tag">MAG 5000</text>
    <text x="282" y="309" class="box-sub" style="font-size:9px;">Flow Meter</text>

    <rect x="100" y="326" width="115" height="42" fill="#FDF2F3" stroke="#E2001A" stroke-width="1.2" rx="4"/>
    <text x="157" y="344" class="danfoss-tag">FC 202</text>
    <text x="157" y="359" class="box-sub" style="font-size:9px;">Pump VFD</text>

    <rect x="225" y="326" width="115" height="42" fill="#FDF2F3" stroke="#E2001A" stroke-width="1.2" rx="4"/>
    <text x="282" y="344" class="danfoss-tag">ECL 310</text>
    <text x="282" y="359" class="box-sub" style="font-size:9px;">Controller</text>

    <!-- ══ PIPES: CDU ↔ FACILITY ══ -->
    <text x="220" y="400" class="loop-name">Facility Loop (Primary)</text>
    <!-- left = cold supply UP to CDU -->
    <path class="pipe-bg" d="M 150 456 L 150 378"/>
    <path class="flow-cold" d="M 150 456 L 150 378"/>
    <polygon points="144,390 150,378 156,390" fill="#0E7AC4"/>
    <!-- right = warm return DOWN to facility -->
    <path class="pipe-bg" d="M 290 378 L 290 456"/>
    <path class="flow-warm" d="M 290 378 L 290 456"/>
    <polygon points="284,444 290,456 296,444" fill="#E08A00"/>
    <!-- temps -->
    <text x="96" y="424" class="temp-label" fill="#0E7AC4" id="t-fac-supply">12.0°C</text>
    <text x="348" y="424" class="temp-label" fill="#E08A00" id="t-fac-return">18.0°C</text>
    <!-- sensor dots -->
    <circle cx="150" cy="418" r="5.5" fill="#FFFFFF" stroke="#0E7AC4" stroke-width="2"/>
    <circle cx="290" cy="418" r="5.5" fill="#FFFFFF" stroke="#E08A00" stroke-width="2"/>

    <!-- ══ FACILITY (bottom) ══ -->
    <rect class="box" x="110" y="456" width="220" height="74" rx="5"/>
    <text x="220" y="485" class="box-label">FACILITY</text>
    <text x="220" y="503" class="box-sub">Chiller / Dry Cooler</text>
    <text x="220" y="518" class="box-sub">CW Loop 12→18°C</text>

    <!-- caption -->
    <text x="220" y="552" class="box-sub" style="font-size:9.5px;">
      Heat transfers across the BPHE — Danfoss controls flow &amp; temp.
    </text>
  </svg>

  <div class="legend">
    <div class="legend-item"><div class="legend-line" style="background:var(--cold)"></div>Cold supply</div>
    <div class="legend-item"><div class="legend-line" style="background:var(--hot)"></div>Hot return</div>
    <div class="legend-item"><div class="legend-line" style="background:var(--warm)"></div>Facility return</div>
    <div class="legend-item"><div class="legend-line" style="background:var(--red);width:11px;height:11px;border-radius:2px;"></div>Danfoss</div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Supply</div>
      <div class="metric-val m-cold" id="m-supply">27.4°C</div>
    </div>
    <div class="metric">
      <div class="metric-label">Return</div>
      <div class="metric-val m-hot" id="m-return">35.8°C</div>
    </div>
    <div class="metric">
      <div class="metric-label">Flow</div>
      <div class="metric-val m-flow" id="m-flow">142 L/min</div>
    </div>
    <div class="metric">
      <div class="metric-label">ΔP</div>
      <div class="metric-val m-p" id="m-dp">1.8 bar</div>
    </div>
  </div>
</div>

<script>
let mode = 'live';

function jitter(base, range, dec = 1) {
  return (base + (Math.random() - 0.5) * range * 2).toFixed(dec);
}

function setMode(m) {
  mode = m;
  document.getElementById('mode-live').classList.toggle('active', m === 'live');
  document.getElementById('mode-manual').classList.toggle('active', m === 'manual');
  document.getElementById('live-badge').innerHTML = m === 'live'
    ? '<span class="live-dot"></span>LIVE'
    : '<span class="live-dot" style="animation:none;background:#E2001A;"></span>MANUAL';

  const inputs = ['in-load','in-fac-supply','in-dt'];
  inputs.forEach(id => document.getElementById(id).disabled = (m === 'live'));

  if (m === 'manual') { onManualChange(); }
}

function onManualChange() {
  const load    = parseFloat(document.getElementById('in-load').value);
  const facIn   = parseFloat(document.getElementById('in-fac-supply').value);
  const dt      = parseFloat(document.getElementById('in-dt').value);

  document.getElementById('in-load-val').textContent = load + ' kW';
  document.getElementById('in-fac-supply-val').textContent = facIn.toFixed(1) + '°C';
  document.getElementById('in-dt-val').textContent = dt.toFixed(1) + ' K';

  // Physics: Q = m * Cp * ΔT  →  derive flow from load + ΔT
  // Cp water = 4.182 kJ/kg·K, flow in L/min
  const cp = 4.182;
  const massFlow = (load) / (cp * dt);      // kg/s
  const flowLmin = massFlow * 60;           // L/min

  const supply = facIn + 15.4;              // secondary supply offset (approach temp)
  const ret    = supply + dt;
  const facRet = facIn + (dt * 0.7);        // facility side smaller ΔT (heat exchanger effectiveness)

  // Pressure drop scales roughly with flow^1.8 (turbulent pipe flow approximation)
  const baseFlow = 142, baseDp = 1.8;
  const dp = baseDp * Math.pow(flowLmin / baseFlow, 1.8);

  applyValues(supply.toFixed(1), ret.toFixed(1), flowLmin.toFixed(0), dp.toFixed(2), load.toFixed(1), facIn.toFixed(1), facRet.toFixed(1));
}

function applyValues(supply, ret, flow, dp, load, facIn, facRet) {
  document.getElementById('m-supply').textContent = supply + '\u00B0C';
  document.getElementById('m-return').textContent = ret + '\u00B0C';
  document.getElementById('m-flow').textContent   = flow + ' L/min';
  document.getElementById('m-dp').textContent     = dp + ' bar';
  document.getElementById('t-sec-supply').textContent = supply + '\u00B0C';
  document.getElementById('t-sec-return').textContent = ret + '\u00B0C';
  document.getElementById('t-fac-supply').textContent = facIn + '\u00B0C';
  document.getElementById('t-fac-return').textContent = facRet + '\u00B0C';
  document.getElementById('rack-load-label').textContent = load + ' kW load';
}

function liveTick() {
  if (mode !== 'live') return;
  const supply = jitter(27.4, 0.5);
  const ret    = jitter(35.8, 0.7);
  const flow   = jitter(142, 4, 0);
  const dp     = jitter(1.8, 0.12, 2);
  const load   = jitter(45.2, 1.5);
  const facIn  = jitter(12.0, 0.3);
  const facRet = jitter(18.0, 0.4);
  applyValues(supply, ret, flow, dp, load, facIn, facRet);
}

liveTick();
setInterval(liveTick, 2000);
</script>
</body>
</html>
