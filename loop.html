<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDU Liquid Cooling Loop — Live Diagram</title>
<style>
  :root {
    --bg: #0F0F0F;
    --card: #1A1A1A;
    --border: #2E2E2E;
    --text: #F0F0F0;
    --muted: #888;
    --red: #E2001A;
    --cold: #00A8FF;
    --warm: #FF9F43;
    --hot: #FF4D4D;
    --green: #00C87A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .loop-widget {
    width: 100%;
    max-width: 860px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
  }

  .loop-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .loop-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--red);
  }
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--green);
    border: 1px solid var(--green);
    padding: 3px 10px;
    border-radius: 3px;
  }
  .live-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: blink 1.2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

  svg { display: block; width: 100%; height: auto; }

  /* Flow animation — dashes move along path */
  .flow-cold {
    stroke: var(--cold);
    stroke-width: 4;
    fill: none;
    stroke-dasharray: 10 8;
    animation: flowmove 1.1s linear infinite;
    filter: drop-shadow(0 0 4px rgba(0,168,255,0.55));
  }
  .flow-hot {
    stroke: var(--hot);
    stroke-width: 4;
    fill: none;
    stroke-dasharray: 10 8;
    animation: flowmove 1.1s linear infinite;
    filter: drop-shadow(0 0 4px rgba(255,77,77,0.55));
  }
  .flow-warm {
    stroke: var(--warm);
    stroke-width: 4;
    fill: none;
    stroke-dasharray: 10 8;
    animation: flowmove 1.4s linear infinite;
    filter: drop-shadow(0 0 4px rgba(255,159,67,0.5));
  }
  @keyframes flowmove { to { stroke-dashoffset: -18; } }

  .pipe-bg {
    stroke: #2a2a2a;
    stroke-width: 8;
    fill: none;
    stroke-linecap: round;
  }

  .box {
    fill: #202020;
    stroke: var(--border);
    stroke-width: 1.5;
    rx: 6;
  }
  .box-danfoss { stroke: var(--red); }

  .box-label {
    font-family: 'Segoe UI', sans-serif;
    font-size: 13px;
    font-weight: 700;
    fill: var(--text);
    text-anchor: middle;
  }
  .box-sub {
    font-size: 10px;
    fill: var(--muted);
    text-anchor: middle;
  }
  .danfoss-tag {
    font-size: 9px;
    font-weight: 700;
    fill: var(--red);
    text-anchor: middle;
    letter-spacing: 0.5px;
  }
  .temp-label {
    font-size: 11px;
    font-weight: 700;
    text-anchor: middle;
  }
  .loop-name {
    font-size: 10px;
    fill: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .legend {
    display: flex;
    gap: 20px;
    margin-top: 14px;
    flex-wrap: wrap;
    font-size: 11px;
    color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-line { width: 22px; height: 4px; border-radius: 2px; }

  .metrics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 16px;
  }
  @media(max-width:600px){ .metrics { grid-template-columns: 1fr 1fr; } }
  .metric {
    background: #161616;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    text-align: center;
  }
  .metric-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .metric-val { font-size: 20px; font-weight: 700; margin-top: 2px; }
  .m-cold { color: var(--cold); }
  .m-hot  { color: var(--hot); }
  .m-flow { color: var(--green); }
  .m-p    { color: var(--warm); }
</style>
</head>
<body>

<div class="loop-widget">
  <div class="loop-head">
    <div class="loop-title">CDU Liquid Cooling Loop — Live Model</div>
    <div class="live-badge"><span class="live-dot"></span>RUNNING</div>
  </div>

  <svg viewBox="0 0 820 360" xmlns="http://www.w3.org/2000/svg">

    <!-- ══ Loop names ══ -->
    <text x="130" y="24" class="loop-name">Facility Loop (Primary)</text>
    <text x="590" y="24" class="loop-name">Technology Loop (Secondary)</text>

    <!-- ══ PIPE BACKGROUNDS ══ -->
    <!-- Primary: Facility -> CDU (cold supply, top) -->
    <path class="pipe-bg" d="M 150 110 L 330 110"/>
    <!-- Primary: CDU -> Facility (hot return, bottom) -->
    <path class="pipe-bg" d="M 330 250 L 150 250"/>
    <!-- Secondary: CDU -> Rack (cold supply, top) -->
    <path class="pipe-bg" d="M 470 110 L 650 110"/>
    <!-- Secondary: Rack -> CDU (hot return, bottom) -->
    <path class="pipe-bg" d="M 650 250 L 470 250"/>
    <!-- Facility vertical connectors -->
    <path class="pipe-bg" d="M 150 110 L 150 250"/>
    <!-- Rack vertical connectors -->
    <path class="pipe-bg" d="M 650 110 L 650 250"/>

    <!-- ══ ANIMATED FLOWS ══ -->
    <!-- Facility cold supply to CDU -->
    <path class="flow-cold" d="M 150 110 L 330 110"/>
    <!-- CDU hot return to Facility -->
    <path class="flow-warm" d="M 330 250 L 150 250"/>
    <!-- CDU cold supply to Rack -->
    <path class="flow-cold" d="M 470 110 L 650 110"/>
    <!-- Rack hot return to CDU -->
    <path class="flow-hot" d="M 650 250 L 470 250"/>
    <!-- Facility loop vertical (internal chiller circulation) -->
    <path class="flow-cold" d="M 150 250 L 150 110"/>
    <!-- Rack internal vertical -->
    <path class="flow-hot" d="M 650 110 L 650 250"/>

    <!-- ══ FACILITY BOX ══ -->
    <rect class="box" x="60" y="140" width="120" height="80" rx="6"/>
    <text x="120" y="172" class="box-label">FACILITY</text>
    <text x="120" y="188" class="box-sub">Chiller / Dry Cooler</text>
    <text x="120" y="204" class="box-sub">CW Loop 12→18°C</text>

    <!-- ══ CDU BOX (center, Danfoss red border) ══ -->
    <rect class="box box-danfoss" x="330" y="90" width="140" height="185" rx="6"/>
    <text x="400" y="122" class="box-label">CDU</text>
    <text x="400" y="138" class="box-sub">Liquid-to-Liquid</text>

    <!-- BPHE inside CDU -->
    <rect x="355" y="152" width="90" height="34" fill="#161616" stroke="#555" stroke-width="1" rx="3"/>
    <text x="400" y="166" class="box-sub" style="font-size:9px;">BPHE Heat Exchanger</text>
    <line x1="362" y1="176" x2="438" y2="176" stroke="#00A8FF" stroke-width="1.5"/>
    <line x1="362" y1="180" x2="438" y2="180" stroke="#FF4D4D" stroke-width="1.5"/>

    <!-- Danfoss components inside CDU -->
    <rect x="345" y="196" width="52" height="24" fill="#1c0d0d" stroke="#E2001A" stroke-width="1" rx="3"/>
    <text x="371" y="207" class="danfoss-tag">AB-QM</text>
    <text x="371" y="216" class="box-sub" style="font-size:8px;">Balancing</text>

    <rect x="403" y="196" width="52" height="24" fill="#1c0d0d" stroke="#E2001A" stroke-width="1" rx="3"/>
    <text x="429" y="207" class="danfoss-tag">MAG 5000</text>
    <text x="429" y="216" class="box-sub" style="font-size:8px;">Flow Meter</text>

    <rect x="345" y="226" width="52" height="24" fill="#1c0d0d" stroke="#E2001A" stroke-width="1" rx="3"/>
    <text x="371" y="237" class="danfoss-tag">FC 202</text>
    <text x="371" y="246" class="box-sub" style="font-size:8px;">Pump VFD</text>

    <rect x="403" y="226" width="52" height="24" fill="#1c0d0d" stroke="#E2001A" stroke-width="1" rx="3"/>
    <text x="429" y="237" class="danfoss-tag">ECL 310</text>
    <text x="429" y="246" class="box-sub" style="font-size:8px;">Controller</text>

    <!-- ══ RACK BOX ══ -->
    <rect class="box" x="620" y="140" width="130" height="80" rx="6"/>
    <text x="685" y="166" class="box-label">GPU RACK</text>
    <text x="685" y="182" class="box-sub">Direct-to-Chip</text>
    <text x="685" y="198" class="box-sub" id="rack-load-label">45.2 kW load</text>
    <!-- heat glow -->
    <rect x="620" y="140" width="130" height="80" rx="6" fill="none" stroke="#FF4D4D" stroke-width="1" opacity="0.4">
      <animate attributeName="opacity" values="0.15;0.5;0.15" dur="2s" repeatCount="indefinite"/>
    </rect>

    <!-- ══ TEMP LABELS on pipes ══ -->
    <text x="240" y="98" class="temp-label" fill="#00A8FF" id="t-fac-supply">12.0°C</text>
    <text x="240" y="272" class="temp-label" fill="#FF9F43" id="t-fac-return">18.0°C</text>
    <text x="560" y="98" class="temp-label" fill="#00A8FF" id="t-sec-supply">27.4°C</text>
    <text x="560" y="272" class="temp-label" fill="#FF4D4D" id="t-sec-return">35.8°C</text>

    <!-- Flow direction arrows -->
    <polygon points="310,104 322,110 310,116" fill="#00A8FF"/>
    <polygon points="170,244 158,250 170,256" fill="#FF9F43"/>
    <polygon points="630,104 642,110 630,116" fill="#00A8FF"/>
    <polygon points="490,244 478,250 490,256" fill="#FF4D4D"/>

    <!-- Sensor dots -->
    <circle cx="240" cy="110" r="5" fill="#0F0F0F" stroke="#00A8FF" stroke-width="2"/>
    <circle cx="240" cy="250" r="5" fill="#0F0F0F" stroke="#FF9F43" stroke-width="2"/>
    <circle cx="560" cy="110" r="5" fill="#0F0F0F" stroke="#00A8FF" stroke-width="2"/>
    <circle cx="560" cy="250" r="5" fill="#0F0F0F" stroke="#FF4D4D" stroke-width="2"/>

    <!-- Bottom caption -->
    <text x="400" y="330" class="box-sub" style="font-size:10px;">
      Two isolated loops — heat transfers across the BPHE. Danfoss components control flow, balance, and temperature.
    </text>
  </svg>

  <!-- LEGEND -->
  <div class="legend">
    <div class="legend-item"><div class="legend-line" style="background:var(--cold)"></div>Cold supply</div>
    <div class="legend-item"><div class="legend-line" style="background:var(--warm)"></div>Facility return</div>
    <div class="legend-item"><div class="legend-line" style="background:var(--hot)"></div>Hot return (rack)</div>
    <div class="legend-item"><div class="legend-line" style="background:var(--red);width:12px;height:12px;border-radius:2px;"></div>Danfoss component</div>
  </div>

  <!-- LIVE METRICS -->
  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Supply</div>
      <div class="metric-val m-cold" id="m-supply">27.4°C</div>
    </div>
    <div class="metric">
      <div class="metric-label">Return</div>
      <div class="metric-val m-hot" id="m-return">35.8°C</div>
    </div>
    <div class="metric">
      <div class="metric-label">Flow</div>
      <div class="metric-val m-flow" id="m-flow">142 L/min</div>
    </div>
    <div class="metric">
      <div class="metric-label">ΔP</div>
      <div class="metric-val m-p" id="m-dp">1.8 bar</div>
    </div>
  </div>
</div>

<script>
// ── Live value simulation — same style as your platform ──
function jitter(base, range, dec = 1) {
  return (base + (Math.random() - 0.5) * range * 2).toFixed(dec);
}

function tick() {
  const supply = jitter(27.4, 0.5);
  const ret    = jitter(35.8, 0.7);
  const flow   = jitter(142, 4, 0);
  const dp     = jitter(1.8, 0.12, 2);
  const load   = jitter(45.2, 1.5);

  document.getElementById('m-supply').textContent = supply + '°C';
  document.getElementById('m-return').textContent = ret + '°C';
  document.getElementById('m-flow').textContent   = flow + ' L/min';
  document.getElementById('m-dp').textContent     = dp + ' bar';

  document.getElementById('t-sec-supply').textContent = supply + '°C';
  document.getElementById('t-sec-return').textContent = ret + '°C';
  document.getElementById('t-fac-supply').textContent = jitter(12.0, 0.3) + '°C';
  document.getElementById('t-fac-return').textContent = jitter(18.0, 0.4) + '°C';
  document.getElementById('rack-load-label').textContent = load + ' kW load';
}

tick();
setInterval(tick, 2000);
</script>
</body>
</html>
